<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Core - 社長タスク管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <a href="index.html" class="app-title-link">
    <h1 class="app-title">
      <img src="assets/koala-work.png" alt="" class="koala header-koala">
      Agenda Core
    </h1>
  </a>
  <div class="user-bar">
    <span><span id="user-name" class="user-bar-name">-</span></span>
    <span id="user-role" class="user-bar-role">-</span>
    <a href="#" id="link-switch" class="user-bar-btn">👤 担当切替</a>
    <a href="#" id="link-logout" class="user-bar-btn user-bar-btn-logout" title="ログアウト">ログアウト</a>
  </div>
</header>

<main class="app-main">

  <!-- 担当者タブ(大タブ)+ 管理ボタン -->
  <div class="assignee-tabs-row">
    <div class="assignee-tabs">
      <button class="assignee-tab active" data-assignee="向江村 章">
        <span class="assignee-tab-label">向江村のタスク</span>
        <span class="assignee-tab-count" id="assignee-count-mukaemura">0</span>
      </button>
      <button class="assignee-tab" data-assignee="村井 莉彩">
        <span class="assignee-tab-label">村井のタスク</span>
        <span class="assignee-tab-count" id="assignee-count-murai">0</span>
      </button>
    </div>
    <a href="#" id="link-admin" class="admin-btn hidden">⚙ 管理</a>
  </div>

  <!-- メインタブ:現在 / 過去 -->
  <div class="main-tabs">
    <button class="main-tab active" data-tab="current">
      <span class="main-tab-label">現在対応中</span>
      <span class="main-tab-count" id="tab-count-current">0</span>
    </button>
    <button class="main-tab" data-tab="past">
      <span class="main-tab-label">過去のタスク</span>
      <span class="main-tab-count" id="tab-count-past">0</span>
    </button>
  </div>

  <div class="toolbar">
    <button id="btn-new" class="btn btn-primary">+ 新しいタスクを登録</button>
    <input type="text" id="filter-text" class="field-input" placeholder="検索(概要・メモ)" style="width: 220px;">
    <select id="filter-client" class="field-select" style="width: 200px;">
      <option value="">すべてのクライアント</option>
    </select>
    <div class="toolbar-spacer"></div>
    <button id="btn-refresh" class="btn btn-sm">↻ 再読み込み</button>
  </div>

  <div id="stat-row" class="stat-row"></div>

  <div id="task-container">
    <div class="loading">タスクを読み込み中...</div>
  </div>

</main>

<!-- 新規/編集モーダル -->
<div id="modal-edit" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="modal-title">タスクを登録</h2>
      <button class="modal-close" data-close>&times;</button>
    </div>
    <div class="modal-body" id="modal-body-inner">
      <div class="field">
        <label class="field-label">Chatworkメッセージリンク <span class="text-muted">(任意)</span></label>
        <input type="url" id="f-url" class="field-input" placeholder="https://www.chatwork.com/#!rid...">
        <p class="field-help">該当メッセージのURLを貼り付けると、ワンクリックで開けます</p>
      </div>
      <div class="field">
        <label class="field-label">クライアント <span class="text-muted">(任意)</span></label>
        <div class="client-picker-row">
          <div class="client-picker" id="client-picker">
            <input type="hidden" id="f-client-id" value="">
            <button type="button" id="f-client-trigger" class="client-picker-trigger">
              <span id="f-client-display" class="client-picker-display">クライアントを選択</span>
              <span class="client-picker-arrow">▼</span>
            </button>
            <div class="client-picker-dropdown hidden" id="client-picker-dropdown">
              <div class="client-picker-search-wrap">
                <input type="text" id="f-client-search" class="field-input client-picker-search" placeholder="🔍 検索" autocomplete="off">
              </div>
              <div class="client-picker-list" id="client-picker-list"></div>
            </div>
          </div>
          <button type="button" id="btn-add-client-inline" class="btn client-add-btn" title="新しいクライアントを追加">+</button>
        </div>
      </div>
      <div class="field">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
          <label class="field-label" style="margin-bottom: 0;">概要 <span class="text-muted">*必須</span></label>
          <button type="button" id="btn-extract-link" class="btn btn-sm">📋 リンクを抽出</button>
        </div>
        <textarea id="f-summary" class="field-textarea" placeholder="Chatworkの引用+リンクをそのまま貼り付けてOK&#10;「リンクを抽出」を押すと、URLだけ上の欄に移動します" required style="min-height: 140px;"></textarea>
      </div>
      <div class="field">
        <label class="field-label">メモ <span class="text-muted">(任意・補足や申し送り)</span></label>
        <input type="text" id="f-details" class="field-input" placeholder="例:急ぎ案件、社長確認後返信予定">
      </div>
      <div class="row">
        <div class="field" style="flex: 0 0 180px;">
          <label class="field-label">期限</label>
          <input type="date" id="f-deadline" class="field-input">
        </div>
        <div class="field" id="f-status-wrap" style="flex: 0 0 180px;">
          <label class="field-label">ステータス</label>
          <select id="f-status" class="field-select">
            <option value="未着手">未着手</option>
            <option value="進行中">進行中</option>
            <option value="引継ぎ済">引継ぎ済</option>
            <option value="対応不要">対応不要</option>
            <option value="完了">完了</option>
          </select>
        </div>
      </div>
      <div class="field hidden" id="f-assignee-wrap">
        <label class="field-label">担当者(タスクの帰属タブ)</label>
        <select id="f-assignee" class="field-select">
          <option value="向江村 章">向江村のタスク</option>
          <option value="村井 莉彩">村井のタスク</option>
        </select>
        <p class="field-help">変更すると別のタブに移動します</p>
      </div>
      <div id="modal-message"></div>

      <!-- 取り込み中オーバーレイ -->
      <div id="extract-overlay" class="extract-overlay hidden">
        <img src="assets/koala-work.png" alt="" class="koala extract-koala">
        <p class="extract-message">取り込み中...</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close>キャンセル</button>
      <button id="btn-save" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- クライアント新規追加モーダル -->
<div id="modal-add-client" class="modal-backdrop hidden">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-head">
      <h2 class="modal-title">新しいクライアントを追加</h2>
      <button class="modal-close" data-close-client>&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">クライアント名</label>
        <input type="text" id="f-new-client-name" class="field-input" placeholder="例:株式会社Link Core" autocomplete="off">
      </div>
      <div id="add-client-message"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close-client>キャンセル</button>
      <button id="btn-confirm-add-client" class="btn btn-primary">追加</button>
    </div>
  </div>
</div>

<script src="github-store.js"></script>
<script>
(async function() {
  if (!Auth.requireLogin()) return;

  // 利用者情報を表示するためのusersキャッシュをロード
  try {
    await AgendaStore.loadUsers();
  } catch (e) {
    if (e.message === 'UNAUTHORIZED') {
      AgendaStore.logout();
      window.location.href = 'login.html';
      return;
    }
  }

  // ユーザーバー
  document.getElementById('user-name').textContent = AgendaStore.getCurrentUserDisplayName() || '?';
  const role = AgendaStore.getCurrentUserRole();
  const roleEl = document.getElementById('user-role');
  roleEl.textContent = role === 'super_admin' ? '絶対管理者' : (role === 'admin' ? '管理者' : 'メンバー');
  roleEl.className = 'user-bar-role ' + (role || '');

  if (AgendaStore.isAdmin()) {
    document.getElementById('link-admin').classList.remove('hidden');
    document.getElementById('link-admin').href = 'admin.html';
  }

  document.getElementById('link-switch').addEventListener('click', (e) => {
    e.preventDefault();
    AgendaStore.softLogout();
    AgendaStore.setUnlocked(true); // PATは生きてるのでログイン画面ではなく担当者選択へ
    window.location.href = 'operator-select.html';
  });

  document.getElementById('link-logout').addEventListener('click', (e) => {
    e.preventDefault();
    if (!confirm('ログアウトしますか?(このPCのアクセストークンは保持されます)')) return;
    AgendaStore.softLogout();
    window.location.href = 'login.html';
  });

  // ===== 状態管理 =====
  const state = {
    tasks: [],
    clients: [],
    assignee: '向江村 章',  // デフォルトは向江村タブ
    mainTab: 'current',     // 'current' | 'past'
    filterStatus: 'all',
    filterClient: '',       // クライアントID('' = 全部)
    filterText: '',
    editingId: null
  };

  const STATUS_LIST = ['未着手', '進行中', '引継ぎ済', '対応不要', '完了'];
  const CURRENT_STATUSES = ['未着手', '進行中'];
  const PAST_STATUSES = ['引継ぎ済', '対応不要', '完了'];
  const ASSIGNEES = ['向江村 章', '村井 莉彩'];

  // ===== ユーティリティ =====
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function nl2br(s) { return escapeHtml(s).replace(/\n/g, '<br>'); }

  function priorityLabel(p) {
    return { high: '高', medium: '中', low: '低' }[p] || '中';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDateTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function deadlineClass(deadline, status) {
    if (!deadline || status === '完了' || status === '対応不要') return '';
    const d = new Date(deadline);
    const now = new Date();
    now.setHours(0,0,0,0);
    const diff = (d - now) / 86400000;
    if (diff < 0) return 'deadline-over';
    if (diff <= 1) return 'deadline-near';
    return '';
  }

  function getClientById(id) {
    if (!id) return null;
    return state.clients.find(c => c.id === id) || null;
  }

  function getClientName(id) {
    const c = getClientById(id);
    return c ? c.name : '';
  }

  // ===== レンダリング =====
  function renderAssigneeCounts() {
    const counts = { '向江村 章': 0, '村井 莉彩': 0 };
    state.tasks.forEach(t => {
      const a = t.assignee || '向江村 章';
      if (counts[a] != null) counts[a]++;
    });
    document.getElementById('assignee-count-mukaemura').textContent = counts['向江村 章'];
    document.getElementById('assignee-count-murai').textContent = counts['村井 莉彩'];
  }

  function getAssigneeTasks() {
    // 現在の担当者タブのタスクだけ抽出
    return state.tasks.filter(t => (t.assignee || '向江村 章') === state.assignee);
  }

  function renderTabCounts() {
    // 現在の担当者タブのタスクの中での「現在/過去」を集計
    const myTasks = getAssigneeTasks();
    let cur = 0, past = 0;
    myTasks.forEach(t => {
      if (CURRENT_STATUSES.includes(t.status)) cur++;
      else if (PAST_STATUSES.includes(t.status)) past++;
    });
    document.getElementById('tab-count-current').textContent = cur;
    document.getElementById('tab-count-past').textContent = past;
  }

  function renderStats() {
    // 担当者タブ + メインタブで絞り込んだ範囲のステータス集計
    const myTasks = getAssigneeTasks();
    const tabStatuses = state.mainTab === 'current' ? CURRENT_STATUSES : PAST_STATUSES;

    const counts = { all: 0 };
    tabStatuses.forEach(s => counts[s] = 0);
    myTasks.forEach(t => {
      if (tabStatuses.includes(t.status)) {
        counts.all++;
        counts[t.status]++;
      }
    });

    const allLabel = state.mainTab === 'current' ? 'すべて(現在)' : 'すべて(過去)';
    const items = [
      { key: 'all', label: allLabel, value: counts.all },
      ...tabStatuses.map(s => ({ key: s, label: s, value: counts[s] }))
    ];

    const html = items.map(it => `
      <div class="stat-card ${state.filterStatus === it.key ? 'active' : ''}" data-status="${escapeHtml(it.key)}">
        <div class="stat-label">${escapeHtml(it.label)}</div>
        <div class="stat-value">${it.value}</div>
      </div>
    `).join('');

    const $row = document.getElementById('stat-row');
    $row.innerHTML = html;
    // 現在タブは3カラム(すべて+未着手+進行中)、過去タブは4カラム(すべて+3つ)に
    $row.style.gridTemplateColumns = state.mainTab === 'current'
      ? 'repeat(3, 1fr)'
      : 'repeat(4, 1fr)';
    $row.querySelectorAll('.stat-card').forEach(card => {
      card.addEventListener('click', () => {
        state.filterStatus = card.dataset.status;
        renderStats();
        renderTasks();
      });
    });
  }

  function getFilteredTasks() {
    // まず担当者タブで絞り込み
    let list = getAssigneeTasks();

    // メインタブ(現在/過去)で絞り込み
    const tabStatuses = state.mainTab === 'current' ? CURRENT_STATUSES : PAST_STATUSES;
    list = list.filter(t => tabStatuses.includes(t.status));

    if (state.filterStatus !== 'all') {
      list = list.filter(t => t.status === state.filterStatus);
    }

    // クライアント絞り込み
    if (state.filterClient) {
      list = list.filter(t => t.clientId === state.filterClient);
    }
    const q = state.filterText.trim().toLowerCase();
    if (q) {
      list = list.filter(t =>
        (t.summary || '').toLowerCase().includes(q) ||
        (t.details || '').toLowerCase().includes(q)
      );
    }
    // 並び替え:期限が近いものを上、期限なしは下、新しい更新を優先
    list.sort((a, b) => {
      // 期限ありが上、期限なしが下
      const aHas = a.deadline ? 0 : 1;
      const bHas = b.deadline ? 0 : 1;
      if (aHas !== bHas) return aHas - bHas;
      // 期限ありどうしは期限の早い順
      if (a.deadline && b.deadline && a.deadline !== b.deadline) {
        return a.deadline < b.deadline ? -1 : 1;
      }
      // それ以外は更新日が新しい順
      return new Date(b.updatedAt) - new Date(a.updatedAt);
    });
    return list;
  }

  function renderTasks() {
    const list = getFilteredTasks();
    const $c = document.getElementById('task-container');

    if (!list.length) {
      const isEmptyAll = state.tasks.length === 0;
      const koalaImg = isEmptyAll ? 'assets/koala-cheer.png' : 'assets/koala-wave2.png';
      const msg = isEmptyAll
        ? '登録されたタスクはまだありません。<br>「+ 新しいタスクを登録」から追加してください。'
        : '該当するタスクがありません';
      $c.innerHTML = `<div class="empty-state">
        <img src="${koalaImg}" alt="" class="koala empty-koala">
        <div>${msg}</div>
      </div>`;
      return;
    }

    $c.innerHTML = `<div class="task-list">${list.map(renderTaskCard).join('')}</div>`;
    bindTaskCardEvents();
  }

  function renderTaskCard(t) {
    const dlClass = deadlineClass(t.deadline, t.status);
    const memos = (t.memos || []).map(m => `
      <div class="memo-item">
        <div class="memo-head">
          <span class="memo-author">${escapeHtml(m.by)}</span>
          <span>${escapeHtml(formatDateTime(m.at))}</span>
        </div>
        <div class="memo-text">${nl2br(m.text)}</div>
      </div>
    `).join('');

    const linkBtn = t.chatworkUrl
      ? `<a href="${escapeHtml(t.chatworkUrl)}" target="_blank" rel="noopener" class="btn btn-sm">↗ Chatworkで開く</a>`
      : '';

    const statusOptions = STATUS_LIST.map(s =>
      `<option value="${s}" ${s === t.status ? 'selected' : ''}>${s}</option>`
    ).join('');

    return `
      <div class="task-card status-${escapeHtml(t.status)}" data-id="${escapeHtml(t.id)}">
        <div class="task-card-head">
          <h3 class="task-summary">${nl2br(t.summary || '(無題)')}</h3>
          <span class="status-badge status-${escapeHtml(t.status)}">${escapeHtml(t.status)}</span>
        </div>

        <div class="task-meta">
          ${getClientName(t.clientId) ? `<span class="task-meta-item"><span class="client-tag">🏢 ${escapeHtml(getClientName(t.clientId))}</span></span>` : ''}
          ${t.deadline ? `<span class="task-meta-item ${dlClass}">📅 期限 ${escapeHtml(formatDate(t.deadline))}</span>` : ''}
          <span class="task-meta-item text-muted">登録 ${escapeHtml(formatDateTime(t.createdAt))} by ${escapeHtml(t.createdBy)}</span>
          ${t.updatedAt && t.updatedAt !== t.createdAt ? `<span class="task-meta-item text-muted">更新 ${escapeHtml(formatDateTime(t.updatedAt))} by ${escapeHtml(t.updatedBy)}</span>` : ''}
        </div>

        ${t.details ? `<div class="task-details task-details-memo">📝 ${escapeHtml(t.details)}</div>` : ''}

        ${memos ? `<div class="memo-list">${memos}</div>` : ''}

        <div class="task-actions">
          ${linkBtn}
          <select class="field-select status-quick" style="width: auto; padding: 6px 8px; font-size: 12px;">
            ${statusOptions}
          </select>
          <button class="btn btn-sm act-memo">+ メモ追加</button>
          <button class="btn btn-sm act-edit">編集</button>
          <button class="btn btn-sm btn-danger act-delete">削除</button>
        </div>
      </div>
    `;
  }

  function bindTaskCardEvents() {
    document.querySelectorAll('.task-card').forEach(card => {
      const id = card.dataset.id;
      card.querySelector('.status-quick').addEventListener('change', async (e) => {
        const newStatus = e.target.value;
        try {
          await AgendaStore.updateTask(id, { status: newStatus });
          await reload();
        } catch (err) {
          alert('更新失敗:' + (err.message || ''));
        }
      });
      card.querySelector('.act-edit').addEventListener('click', () => openEditModal(id));
      card.querySelector('.act-delete').addEventListener('click', async () => {
        if (!confirm('このタスクを削除しますか?この操作は取り消せません。')) return;
        try {
          await AgendaStore.deleteTask(id);
          await reload();
        } catch (err) {
          alert('削除失敗:' + (err.message || ''));
        }
      });
      card.querySelector('.act-memo').addEventListener('click', async () => {
        const text = prompt('メモを追加:');
        if (!text || !text.trim()) return;
        try {
          await AgendaStore.addMemo(id, text.trim());
          await reload();
        } catch (err) {
          alert('メモ追加失敗:' + (err.message || ''));
        }
      });
    });
  }

  // ===== モーダル =====
  const $modal = document.getElementById('modal-edit');

  function openEditModal(id) {
    state.editingId = id || null;
    document.getElementById('modal-title').textContent = id ? 'タスクを編集' : 'タスクを登録';
    document.getElementById('modal-message').innerHTML = '';

    const $statusWrap = document.getElementById('f-status-wrap');
    const $assigneeWrap = document.getElementById('f-assignee-wrap');
    if (id) {
      // 編集時:ステータスも担当者も変更可能
      $statusWrap.classList.remove('hidden');
      $assigneeWrap.classList.remove('hidden');
      const t = state.tasks.find(x => x.id === id);
      if (!t) return;
      document.getElementById('f-url').value = t.chatworkUrl || '';
      document.getElementById('f-summary').value = t.summary || '';
      document.getElementById('f-details').value = t.details || '';
      document.getElementById('f-deadline').value = t.deadline || '';
      document.getElementById('f-status').value = t.status || '未着手';
      document.getElementById('f-assignee').value = t.assignee || '向江村 章';
      // クライアント表示を更新
      setClientPickerValue(t.clientId || '');
    } else {
      // 新規登録時:ステータスも担当者も非表示(自動設定)
      $statusWrap.classList.add('hidden');
      $assigneeWrap.classList.add('hidden');
      ['f-url','f-summary','f-details','f-deadline'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-status').value = '未着手';
      document.getElementById('f-assignee').value = state.assignee;  // 開いているタブの人
      setClientPickerValue('');
    }
    document.getElementById('client-picker-dropdown').classList.add('hidden');
    document.getElementById('f-client-trigger').classList.remove('open');
    $modal.classList.remove('hidden');
    setTimeout(() => document.getElementById('f-summary').focus(), 50);
  }

  function closeModal() {
    $modal.classList.add('hidden');
    state.editingId = null;
  }

  $modal.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeModal));
  $modal.addEventListener('click', (e) => {
    if (e.target === $modal) closeModal();
  });

  document.getElementById('btn-new').addEventListener('click', () => openEditModal(null));

  // ===== リンク抽出ボタン =====
  document.getElementById('btn-extract-link').addEventListener('click', async () => {
    const $summary = document.getElementById('f-summary');
    const $url = document.getElementById('f-url');
    const $overlay = document.getElementById('extract-overlay');
    const $msg = document.getElementById('modal-message');
    $msg.innerHTML = '';

    const text = $summary.value;
    if (!text.trim()) {
      $msg.innerHTML = '<div class="alert alert-info">概要欄が空です。Chatworkのメッセージを貼り付けてからお試しください</div>';
      return;
    }

    // オーバーレイを表示(視覚的フィードバック)
    $overlay.classList.remove('hidden');

    // 0.4秒だけ待つ(取り込んでる感を出す)
    await new Promise(r => setTimeout(r, 400));

    // ChatworkのメッセージURLを優先的に探す。なければ普通のhttp(s)://を探す
    const chatworkRegex = /https?:\/\/(?:www\.)?chatwork\.com\/[^\s\u3000]+/i;
    const generalRegex = /https?:\/\/[^\s\u3000]+/i;

    let match = text.match(chatworkRegex);
    if (!match) match = text.match(generalRegex);

    if (!match) {
      $overlay.classList.add('hidden');
      $msg.innerHTML = '<div class="alert alert-info">URLが見つかりませんでした。そのまま保存してOKです</div>';
      return;
    }

    const url = match[0];
    // URLを削除して、空行を整理
    const cleaned = text.replace(url, '').replace(/\n{3,}/g, '\n\n').trim();

    $url.value = url;
    $summary.value = cleaned;

    $overlay.classList.add('hidden');
    $msg.innerHTML = '<div class="alert alert-success">✓ URLを抽出しました</div>';
    setTimeout(() => { $msg.innerHTML = ''; }, 2500);
  });

  document.getElementById('btn-save').addEventListener('click', async () => {
    const isNew = !state.editingId;
    const data = {
      chatworkUrl: document.getElementById('f-url').value.trim(),
      summary: document.getElementById('f-summary').value.trim(),
      details: document.getElementById('f-details').value.trim(),
      deadline: document.getElementById('f-deadline').value,
      // 新規登録時は必ず未着手、編集時は選択値を反映
      status: isNew ? '未着手' : document.getElementById('f-status').value,
      // 新規:現在のタブの担当者、編集:選択値
      assignee: isNew ? state.assignee : document.getElementById('f-assignee').value,
      // クライアント(検索窓のテキストでなく、hiddenに入っているIDを使用)
      clientId: document.getElementById('f-client-id').value || ''
    };
    const $msg = document.getElementById('modal-message');

    if (!data.summary) {
      $msg.innerHTML = '<div class="alert alert-error">「概要」は必須です</div>';
      return;
    }

    $msg.innerHTML = '<div class="alert alert-info">保存中...</div>';
    document.getElementById('btn-save').disabled = true;
    try {
      if (state.editingId) {
        await AgendaStore.updateTask(state.editingId, data);
      } else {
        await AgendaStore.addTask(data);
      }
      closeModal();
      await reload();
    } catch (err) {
      $msg.innerHTML = `<div class="alert alert-error">保存失敗:${escapeHtml(err.message || '')}</div>`;
    } finally {
      document.getElementById('btn-save').disabled = false;
    }
  });

  // ===== 検索 =====
  document.getElementById('filter-text').addEventListener('input', (e) => {
    state.filterText = e.target.value;
    renderTasks();
  });

  document.getElementById('btn-refresh').addEventListener('click', reload);

  // ===== 担当者タブ切り替え(大タブ) =====
  document.querySelectorAll('.assignee-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const newAssignee = tab.dataset.assignee;
      if (state.assignee === newAssignee) return;
      state.assignee = newAssignee;
      state.mainTab = 'current';        // 担当者切り替え時は現在タブに戻す
      state.filterStatus = 'all';
      document.querySelectorAll('.assignee-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      // 小タブも見た目をリセット
      document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.main-tab[data-tab="current"]').classList.add('active');
      renderTabCounts();
      renderStats();
      renderTasks();
    });
  });

  // ===== メインタブ切り替え(小タブ) =====
  document.querySelectorAll('.main-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const newTab = tab.dataset.tab;
      if (state.mainTab === newTab) return;
      state.mainTab = newTab;
      state.filterStatus = 'all';  // タブ切り替え時はステータス絞り込みもリセット
      document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderStats();
      renderTasks();
    });
  });

  // ===== クライアント絞り込み(ツールバー) =====
  function renderClientFilter() {
    const $sel = document.getElementById('filter-client');
    const current = state.filterClient;
    const sorted = state.clients.slice().sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    $sel.innerHTML = '<option value="">すべてのクライアント</option>' +
      sorted.map(c => `<option value="${escapeHtml(c.id)}" ${c.id === current ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
  }

  document.getElementById('filter-client').addEventListener('change', (e) => {
    state.filterClient = e.target.value;
    renderTasks();
  });

  // ===== クライアントピッカー(プルダウン式) =====
  const $cTrigger = document.getElementById('f-client-trigger');
  const $cDisplay = document.getElementById('f-client-display');
  const $cDropdown = document.getElementById('client-picker-dropdown');
  const $cSearch = document.getElementById('f-client-search');
  const $cId = document.getElementById('f-client-id');
  const $cList = document.getElementById('client-picker-list');

  function setClientPickerValue(id) {
    $cId.value = id || '';
    if (id) {
      const c = getClientById(id);
      $cDisplay.textContent = c ? c.name : '(削除されたクライアント)';
      $cDisplay.classList.remove('placeholder');
    } else {
      $cDisplay.textContent = 'クライアントを選択';
      $cDisplay.classList.add('placeholder');
    }
  }

  function renderClientPickerList(query) {
    const q = (query || '').trim().toLowerCase();
    const sorted = state.clients.slice().sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    const matches = q
      ? sorted.filter(c => c.name.toLowerCase().includes(q))
      : sorted;

    let html = '';
    // 「未選択にする」項目(既に選んでいる場合)
    if ($cId.value) {
      html += `<div class="client-picker-clear" data-clear="1">× 選択を解除</div>`;
    }

    if (matches.length === 0) {
      if (state.clients.length === 0) {
        html += '<div class="client-picker-empty">クライアントがまだ登録されていません<br>右の「+」ボタンから追加してください</div>';
      } else {
        html += `<div class="client-picker-empty">該当するクライアントがありません</div>`;
      }
    } else {
      matches.forEach(c => {
        const sel = c.id === $cId.value ? 'selected' : '';
        html += `<div class="client-picker-item ${sel}" data-id="${escapeHtml(c.id)}" data-name="${escapeHtml(c.name)}">${escapeHtml(c.name)}</div>`;
      });
    }
    $cList.innerHTML = html;
  }

  function openClientDropdown() {
    renderClientPickerList('');
    $cDropdown.classList.remove('hidden');
    $cTrigger.classList.add('open');
    $cSearch.value = '';
    setTimeout(() => $cSearch.focus(), 30);
  }
  function closeClientDropdown() {
    $cDropdown.classList.add('hidden');
    $cTrigger.classList.remove('open');
  }

  $cTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    if ($cDropdown.classList.contains('hidden')) {
      openClientDropdown();
    } else {
      closeClientDropdown();
    }
  });

  $cSearch.addEventListener('input', () => {
    renderClientPickerList($cSearch.value);
  });
  $cSearch.addEventListener('click', (e) => e.stopPropagation());

  $cList.addEventListener('click', (e) => {
    e.stopPropagation();
    const item = e.target.closest('.client-picker-item, .client-picker-clear');
    if (!item) return;
    if (item.classList.contains('client-picker-clear')) {
      setClientPickerValue('');
    } else {
      setClientPickerValue(item.dataset.id);
    }
    closeClientDropdown();
  });

  // 外側クリックでドロップダウンを閉じる
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#client-picker')) {
      closeClientDropdown();
    }
  });

  // ===== クライアント新規追加モーダル =====
  const $addClientModal = document.getElementById('modal-add-client');
  const $newClientName = document.getElementById('f-new-client-name');
  const $addClientMsg = document.getElementById('add-client-message');

  function openAddClientModal() {
    $newClientName.value = '';
    $addClientMsg.innerHTML = '';
    $addClientModal.classList.remove('hidden');
    setTimeout(() => $newClientName.focus(), 50);
  }
  function closeAddClientModal() {
    $addClientModal.classList.add('hidden');
  }

  document.getElementById('btn-add-client-inline').addEventListener('click', openAddClientModal);

  $addClientModal.querySelectorAll('[data-close-client]').forEach(b =>
    b.addEventListener('click', closeAddClientModal)
  );
  $addClientModal.addEventListener('click', (e) => {
    if (e.target === $addClientModal) closeAddClientModal();
  });

  $newClientName.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('btn-confirm-add-client').click();
    }
  });

  document.getElementById('btn-confirm-add-client').addEventListener('click', async () => {
    const name = $newClientName.value.trim();
    if (!name) {
      $addClientMsg.innerHTML = '<div class="alert alert-error">クライアント名を入力してください</div>';
      return;
    }
    try {
      const created = await AgendaStore.addClient(name);
      if (!state.clients.some(c => c.id === created.id)) {
        state.clients.push(created);
      }
      renderClientFilter();
      // 自動で選択状態にする
      setClientPickerValue(created.id);
      closeAddClientModal();
    } catch (err) {
      $addClientMsg.innerHTML = `<div class="alert alert-error">追加失敗:${escapeHtml(err.message || '')}</div>`;
    }
  });

  async function reload() {
    document.getElementById('task-container').innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      // タスクとクライアントを並列で取得
      const [tasks, clients] = await Promise.all([
        AgendaStore.loadTaskList(),
        AgendaStore.loadClientList()
      ]);
      state.tasks = tasks;
      state.clients = clients;
      renderClientFilter();
      renderAssigneeCounts();
      renderTabCounts();
      renderStats();
      renderTasks();
    } catch (err) {
      let m = err.message === 'UNAUTHORIZED'
        ? 'アクセストークンが無効になりました。再ログインしてください。'
        : `読み込み失敗:${err.message || ''}`;
      document.getElementById('task-container').innerHTML = `<div class="alert alert-error">${escapeHtml(m)}</div>`;
      if (err.message === 'UNAUTHORIZED') {
        AgendaStore.logout();
        setTimeout(() => window.location.href = 'login.html', 1500);
      }
    }
  }

  // 初期ロード(forceRefreshでキャッシュ無視)
  try {
    const [tasks, clients] = await Promise.all([
      AgendaStore.loadTaskList(),
      AgendaStore.loadClientList()
    ]);
    state.tasks = tasks;
    state.clients = clients;
    renderClientFilter();
    renderAssigneeCounts();
    renderTabCounts();
    renderStats();
    renderTasks();
  } catch (err) {
    document.getElementById('task-container').innerHTML = `<div class="alert alert-error">読み込み失敗:${escapeHtml(err.message || '')}</div>`;
  }
})();
</script>
</body>
</html>
